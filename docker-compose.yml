services:
  ollama:
    image: ollama/ollama:latest
    container_name: qwenrag-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwenrag-chatbot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  ollama-data:
